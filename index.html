  .controls {
    position: sticky;
    top: 60px;
    z-index: 90;
    background: #fff;

    padding: 10px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;

  .search-wrap { flex: 1; min-width: 200px; }

  .filter-divider { width: 1px; height: 28px; background: #ddd; margin: 0 4px; }

  .cat-btn {
    padding: 6px 14px;

    border-radius: 20px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 600;
    background: #eee;
    color: #555;

  .cat-btn[data-cat="TIR"].active { background: #dc2626; color: #fff; border-color: #dc2626; }
  .cat-btn[data-cat="ATR"].active { background: #16a34a; color: #fff; border-color: #16a34a; }
  .cat-btn[data-cat="DTR"].active { background: #d97706; color: #fff; border-color: #d97706; }
  .cat-btn[data-loc="Grand Junction"].active { background: #7c3aed; color: #fff; border-color: #7c3aed; }
  .cat-btn[data-loc="Rifle"].active { background: #0891b2; color: #fff; border-color: #0891b2; }

    background: #fff;
    padding: 8px 20px;
    font-size: 0.82rem;
    color: #555;
    border-bottom: 1px solid #ddd;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .summary-bar span { display: flex; align-items: center; gap: 6px; }

  .badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 0.72rem;
    font-weight: 700;
    color: #fff;

  .badge-TIR { background: #dc2626; }
  .badge-ATR { background: #16a34a; }
  .badge-DTR { background: #d97706; }
  .badge-loc-GJ { background: #7c3aed; }
  .badge-loc-RI { background: #0891b2; }

  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); font-size: 0.82rem; }

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.toggle('sorted', th.dataset.col === col);
    if (th.dataset.col === col) th.querySelector('.sort-icon').textContent = sortDir === 1 ? '↑' : '↓';
    else th.querySelector('.sort-icon').textContent = '↕';
  });
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  let filtered = rawData;
  if (currentCat !== 'ALL') filtered = filtered.filter(r => r['Category'] === currentCat);
  if (currentLoc !== 'ALL') filtered = filtered.filter(r => r['Location'] === currentLoc);
  if (q) {
    filtered = filtered.filter(r =>
      (r['Description']||'').toLowerCase().includes(q) ||
      (r['Part Number']||'').toLowerCase().includes(q) ||
      (r['Secondary']||'').toLowerCase().includes(q) ||
      (r['Supplier Name']||'').toLowerCase().includes(q) ||
      (r['UPC Code']||'').toLowerCase().includes(q) ||
      (r['Manufacturer Part']||'').toLowerCase().includes(q) ||
      (r['Manufacturer']||'').toLowerCase().includes(q) ||
      (r['Location']||'').toLowerCase().includes(q)
    );
  }
  if (sortCol) {
    filtered = [...filtered].sort((a, b) => {
      let av = a[sortCol]||'', bv = b[sortCol]||'';
      if (sortCol === 'Available' || sortCol === 'Retail Price') {
        return (parseFloat(av)||0 - parseFloat(bv)||0) * sortDir;
      }
      if (sortCol === 'Last Received') {
        const ta = parseDate(av)?.getTime()||0, tb = parseDate(bv)?.getTime()||0;
        return (ta - tb) * sortDir;
      }
      return av.localeCompare(bv) * sortDir;
    });
  }
  renderTable(filtered);
  renderSummary(filtered);
}

function renderSummary(data) {
  const cats = {WHL:0,TIR:0,ATR:0,DTR:0};
  const locs = {'Grand Junction':0,'Rifle':0};
  data.forEach(r => {
    if (cats[r['Category']] !== undefined) cats[r['Category']]++;
    if (locs[r['Location']] !== undefined) locs[r['Location']]++;
  });
  document.getElementById('summaryBar').innerHTML = `
    <span><strong>${data.length}</strong> SKUs shown</span>
    <span><span class="badge badge-WHL">WHL</span> <span class="count-label">${cats.WHL}</span></span>
    <span><span class="badge badge-TIR">TIR</span> <span class="count-label">${cats.TIR}</span></span>
    <span><span class="badge badge-ATR">ATR</span> <span class="count-label">${cats.ATR}</span></span>
    <span><span class="badge badge-DTR">DTR</span> <span class="count-label">${cats.DTR}</span></span>
    <span style="margin-left:10px;color:#aaa;">|</span>
    <span><span class="badge badge-loc-GJ">GJ</span> <span class="count-label">${locs['Grand Junction']}</span></span>
    <span><span class="badge badge-loc-RI">RI</span> <span class="count-label">${locs['Rifle']}</span></span>
  `;
}

function renderTable(data) {
  const tbody = document.getElementById('tableBody');
  if (!data.length) { tbody.innerHTML = '<tr><td colspan="12" class="no-results">No results found.</td></tr>'; return; }
  tbody.innerHTML = data.map(r => {
    const stale = isStale(r['Last Received']);
    const partClass = 'part-bold' + (stale ? ' part-stale' : '');
    const loc = r['Location']||'';
    return `<tr>
      <td><span class="qty ${qtyClass(r['Available'])}">${escHtml(r['Available'])}</span></td>
      <td><span class="badge badge-${r['Category']}">${escHtml(r['Category'])}</span></td>
      <td><span class="loc-badge ${locClass(loc)}">${escHtml(loc)}</span></td>
      <td>${escHtml(r['Description'])}</td>
      <td><span class="${partClass}">${escHtml(r['Part Number'])}</span></td>
      <td>${escHtml(r['Secondary'])}</td>
      <td>${escHtml(r['Manufacturer Part'])}</td>
      <td>${escHtml(r['Manufacturer'])}</td>
      <td>${escHtml(r['Supplier Name'])}</td>
      <td>${escHtml(r['UPC Code'])}</td>
      <td>${escHtml(r['Retail Price'] ? '$'+parseFloat(r['Retail Price']).toFixed(2) : '')}</td>
      <td>${escHtml(r['Last Received'])}</td>
    </tr>`;
  }).join('');
}

applyFilters();
</script>
</body>
</html>
