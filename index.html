<style>

  /* Header */

  .search-bar{width:100%;padding:9px 14px;background:#0f0f1a;border:1px solid #2a2a4a;border-radius:8px;color:#e0e0e0;font-size:.95rem;outline:none;margin-bottom:10px}

  .filter-label{font-size:.75rem;color:#8888aa;text-transform:uppercase;letter-spacing:.08em;margin-right:2px}

  .btn-tir.active{color:#f87171;border-color:#f87171;background:rgba(248,113,113,.12)}

  .btn-plg.active{color:#f472b6;border-color:#f472b6;background:rgba(244,114,182,.12)}

  .divider{width:1px;height:18px;background:#2a2a4a;margin:0 4px}
  
  /* Summary */
  .summary{background:#12122a;padding:8px 20px;display:flex;flex-wrap:wrap;gap:12px;font-size:.78rem;color:#9999bb;border-bottom:1px solid #1e1e3a}
  .summary-item{display:flex;align-items:center;gap:5px}
  .summary-count{font-weight:700;color:#e0e0e0;font-size:.85rem}
  
  /* Table */
  .table-wrap{overflow-x:auto;padding:0}
  table{width:100%;border-collapse:collapse;font-size:.82rem}
  thead th{background:#1a1a2e;padding:10px 10px;text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:.07em;color:#7777aa;cursor:pointer;white-space:nowrap;user-select:none;border-bottom:1px solid #2a2a4a;position:sticky;top:0}
  thead th:hover{color:#aaaace}
  thead th.sort-asc::after{content:' ↑'}
  thead th.sort-desc::after{content:' ↓'}
  tbody tr{border-bottom:1px solid #1a1a2e;transition:background .1s}
  tbody tr:hover{background:#16213e}
  td{padding:8px 10px;vertical-align:middle}
  .no-results{text-align:center;padding:40px;color:#666}

  .badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.7rem;font-weight:700;letter-spacing:.05em}

  .badge-ATR{background:rgba(74,222,128,.2);color:#4ade80;border:1px solid rgba(74,222,128,.4)}
  .badge-DTR{background:rgba(251,191,36,.2);color:#fbbf24;border:1px solid rgba(251,191,36,.4)}

  .badge-gj{background:rgba(192,132,252,.2);color:#c084fc;border:1px solid rgba(192,132,252,.4)}
  .badge-rfl{background:rgba(34,211,238,.2);color:#22d3ee;border:1px solid rgba(34,211,238,.4)}

  .qty-green{color:#4ade80;font-weight:700}
  
  /* Part # */
  .part-num{font-weight:700;font-family:'Courier New',monospace;font-size:.8rem}

  .price{white-space:nowrap}

const TODAY = new Date('2026-07-02');
const MS_PER_DAY = 86400000;

let activeCat = 'ALL';
let activeLoc = 'BOTH';
let sortCol = 'description';
let sortDir = 1;

function parseDate(s) {
  if (!s) return null;
  const [m,d,y] = s.split('/');
  if (!m||!d||!y) return null;
  return new Date(+y, +m-1, +d);
}

function isStale(dateStr) {
  const d = parseDate(dateStr);
  if (!d) return false;
  return (TODAY - d) / MS_PER_DAY > 365;
}

function qtyClass(q) {
  const n = parseInt(q);
  if (isNaN(n)) return '';
  if (n <= 1) return 'qty-red';
  if (n <= 4) return 'qty-amber';
  return 'qty-green';
}

function locBadge(loc) {
  if (loc === 'Grand Junction') return '<span class="badge badge-gj">GJ</span>';
  if (loc === 'Rifle') return '<span class="badge badge-rfl">RFL</span>';
  return `<span class="badge">${loc}</span>`;
}

function setCat(cat, btn) {
  activeCat = cat;
  document.querySelectorAll('.btn-all,.btn-whl,.btn-tir,.btn-atr,.btn-dtr,.btn-bat').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function setLoc(loc, btn) {
  activeLoc = loc;
  document.querySelectorAll('.btn-both,.btn-gj,.btn-rfl').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function sortBy(col) {
  if (sortCol === col) sortDir = -sortDir;
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('thead th').forEach(th=>th.classList.remove('sort-asc','sort-desc'));
  const idx = ['qty','cat','location','description','partNum','secondary','mfrPart','manufacturer','supplier','upc','price','lastReceived'].indexOf(col);
  const ths = document.querySelectorAll('thead th');
  if (idx >= 0) ths[idx].classList.add(sortDir===1?'sort-asc':'sort-desc');
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  let rows = DATA.filter(r => {
    if (activeCat !== 'ALL' && r.cat !== activeCat) return false;
    if (activeLoc !== 'BOTH' && r.location !== activeLoc) return false;
    if (q) {
      const haystack = [r.description,r.partNum,r.secondary,r.supplier,r.upc,r.mfrPart,r.manufacturer,r.location].join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });

  // Sort
  rows.sort((a,b) => {
    let av = a[sortCol]||'', bv = b[sortCol]||'';
    if (sortCol === 'qty' || sortCol === 'price') {
      av = parseFloat(av)||0; bv = parseFloat(bv)||0;
      return (av-bv)*sortDir;
    }
    if (sortCol === 'lastReceived') {
      const ad = parseDate(av)||new Date(0), bd = parseDate(bv)||new Date(0);
      return (ad-bd)*sortDir;
    }
    return av.localeCompare(bv)*sortDir;
  });

  // Summary
  const catCounts = {};
  const locCounts = {};
  rows.forEach(r => {
    catCounts[r.cat] = (catCounts[r.cat]||0)+1;
    locCounts[r.location] = (locCounts[r.location]||0)+1;
  });
  const catLabels = {WHL:'Wheels',TIR:'Tires',ATR:'ATV/UTV',DTR:'Dirt'};
  let summaryHtml = `<div class="summary-item"><span class="summary-count">${rows.length}</span> SKUs</div>`;
  Object.entries(catCounts).forEach(([c,n]) => {
    summaryHtml += `<div class="summary-item"><span class="badge badge-${c}">${c}</span><span class="summary-count">${n}</span></div>`;
  });
  summaryHtml += '<div style="width:1px;background:#2a2a4a;height:14px"></div>';
  Object.entries(locCounts).forEach(([l,n]) => {
    const cls = l==='Grand Junction'?'badge-gj':'badge-rfl';
    summaryHtml += `<div class="summary-item"><span class="badge ${cls}">${l==='Grand Junction'?'GJ':'RFL'}</span><span class="summary-count">${n}</span></div>`;
  });
  document.getElementById('summary').innerHTML = summaryHtml;

  // Render table
  const tbody = document.getElementById('tbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="12" class="no-results">No results found</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(r => {
    const stale = isStale(r.lastReceived);
    const partClass = 'part-num' + (stale?' part-num-stale':'');
    const price = r.price ? '$'+parseFloat(r.price).toFixed(2) : '';
    return `<tr>
      <td class="${qtyClass(r.qty)}">${r.qty}</td>
      <td><span class="badge badge-${r.cat}">${r.cat}</span></td>
      <td>${locBadge(r.location)}</td>
      <td>${esc(r.description)}</td>
      <td class="${partClass}">${esc(r.partNum)}</td>
      <td style="font-family:monospace;font-size:.78rem">${esc(r.secondary)}</td>
      <td style="font-family:monospace;font-size:.78rem">${esc(r.mfrPart)}</td>
      <td>${esc(r.manufacturer)}</td>
      <td>${esc(r.supplier)}</td>
      <td style="font-family:monospace;font-size:.75rem">${esc(r.upc)}</td>
      <td class="price">${price}</td>
      <td style="white-space:nowrap;color:${stale?'#f87171':'inherit'}">${r.lastReceived}</td>
    </tr>`;
  }).join('');
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Initial render
applyFilters();
</script>
